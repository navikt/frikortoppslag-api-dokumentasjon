[project]
site_name = "Frikort Oppslag API"
site_description = "API-dokumentasjon for oppslag av egenandelsfritakstatus"

extra_css = ["stylesheets/extra.css"]

nav = [
    { "Oversikt" = "index.md" },
    { "JWE-kryptering" = "jwe_ende_til_ende_kryptering.md" },
    { "Endepunkter" = [
        { "Hent egenandelsfritakstatus" = "endepunkter/hent_frikortstatus.md" },
        { "Hent JWK-nøkler" = "endepunkter/jwk.md" },
    ] },
    { "Generelt" = [
        { "Kodeverk" = "generelt/kodeverk.md" },
        { "Begrepsliste" = "generelt/begrepsliste.md" },
        { "JSON-konvensjoner" = "generelt/json_konvensjoner.md" },
        { "Endringslogg" = "generelt/endringslogg.md" },
    ] },
]

[project.theme]
language = "nb"

features = [
    "content.code.copy",
    "search.highlight",
    "navigation.sections",
    "navigation.top"
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
toggle.icon = "lucide/sun"
toggle.name = "Bytt til mørk modus"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Bytt til lys modus"
